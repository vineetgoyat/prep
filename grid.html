<!DOCTYPE html>
<html>
    <head>
        <title>Grid Practice</title>
    </head>
    <body style="padding-bottom:1000px;">
        <div style="
            display: grid;
            grid-template-columns: 100px 100px 200px;
            ">
            <div style="background-color:lightblue">div1</div>
            <div style="background-color:lightpink">div2<p>hello</p></div>
            <div style="background-color:lightgreen">div3</div>
        </div>

        <div style="
            margin-top: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            column-gap: 10px;
            row-gap: 20px;
            ">
            <div style="background-color:lightblue; height:200px">div1</div>
            <div style="background-color:lightpink; height:200px">div2</div>
            <div style="background-color:lightgreen; height:200px">div3</div>
            <div style="background-color:lightgreen; height:200px">div3</div>
            <div style="background-color:lightblue; height:200px">div1</div>
            <div style="background-color:lightpink; height:200px">div2</div>
        </div>

    </body>
</html>
