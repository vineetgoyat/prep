<!DOCTYPE html>
<html>
    <head>
        <title>Flexbox practice</title>
    </head>
    <body style="padding-bottom:1000px;">
        <div style="
            display: flex;
            flex-direction: row;
            border-style: solid;
            border-width:1px;
            height: 100px;
            border-color: black;
            margin-top: 20px;
            justify-content: center;
        ">
            <div style="background-color:lightblue; width: 100px; height: 100px;">div1</div>
            <div style="background-color:lightpink; width: 100px; height: 100px;">div2</div>
            <div style="background-color:lightgreen; width: 100px; height: 100px;">div3</div>
        </div>
        <div style="
            display: flex;
            flex-direction: row;
            margin-top: 20px;
        ">
            <div style="background-color:lightblue; width: 100px; height: 100px;flex: 1;">div1</div>
            <div style="background-color:lightpink; width: 100px; height: 100px;flex: 1;">div2</div>
            <div style="background-color:lightgreen; width: 100px; height: 100px;flex: 1;">div3</div>
        </div>
    </body>
</html>
