<!DOCTYPE html>
<html>
    <head>
        <title>Flexbox practice</title>
    </head>
    <body>
        <div style="
            display: flex;
            flex-direction: row;
        ">
            <div style="background-color:lightblue; width: 100px; height: 100px;">div1</div>
            <div style="background-color:lightpink; width: 100px; height: 100px;">div2</div>
        </div>
        <div style="
            display: flex;
            flex-direction: row;
            margin-top: 20px;
        ">
            <div style="background-color:lightblue; width: 100px; height: 100px;flex: 1;">div1</div>
            <div style="background-color:lightpink; width: 100px; height: 100px;flex: 1;">div2</div>
        </div>
    </body>
</html>
