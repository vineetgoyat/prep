<!DOCTYPE html>
<html>
<head>
    <title>youtube.com Clone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <style>
        p{
            font-family: Roboto, Arial;
            margin: 0px;
        }
        .thumbnail {
            width: 300px;
        }
        .thumbnail2 {
            width: 300px;
        }

        .search-bar {
            width: 100px;
            display: block;
        }

        .preview1 {
            width: 300px;
            display: inline-block;
            margin-right: 20px;
        }
        .preview2 {
            width: 300px;
            display: inline-block;
            margin-right: 20px;
        }
        .title1 {
            margin: 0px;
            font-size: 14px;
            font-weight: 500;
            line-height: 18px;

        }
        .title2 {
            margin: 0px;
            font-size: 14px;
            font-weight: 500;
            line-height: 18px;

        }

        .channel-pic1 {
            width: 50px;
            display: inline-block;
            vertical-align: top;
        }
        .channel-pic2 {
            width: 50px;
            display: inline-block;
            vertical-align: top;
        }

        .profile1 {
            width: 40px;
            border-radius: 50%;
        }
        .profile2 {
            width: 40px;
            border-radius: 50%;
        }

        .video-info {
            display: inline-block;
            vertical-align: top;
            width: 200px;
        }
        .video-info2 {
            display: inline-block;
            vertical-align: top;
            width: 200px;
        }

        .auth1 {
            font-size: 12px;
            color: rgb(96, 96, 96);
            display: inline-block;
            margin-bottom: 1px;
            margin-top: 10px;

        }
        .auth2 {
            font-size: 12px;
            color: rgb(96, 96, 96);
            display: inline-block;
            margin-bottom: 1px;
            margin-top: 10px;

        }

        .info1 {
            font-size: 12px;
            color: rgb(96, 96, 96);
            display: inline-block;
            margin-top: 3px;
        }
        .info2 {
            font-size: 12px;
            color: rgb(96, 96, 96);
            display: inline-block;
            margin-top: 3px;
        }
        .thumbnail-row {
            margin-bottom: 12px;
        }
        .thumbnail-row2 {
            margin-bottom: 12px;
        }
    </style>
</head>

<body>

    <input class="search-bar" type="text" placeholder="Search">

    <!-- First Video -->
    <div class="preview1">

        <div class="thumbnail-row">
            <img class="thumbnail" src="thumbnails/thumbnail-1.webp">
        </div>

        <div>

            <div class="channel-pic1">
                <img class="profile1" src="channel-pic/channel-1.jpeg">
            </div>

            <div class="video-info">
                <p class="title1">
                    Talking Tech and AI with Google CEO Sundar Pichai!
                </p>

                <p class="auth1">
                    Marques Brownlee
                </p>

                <p class="info1">
                    3.4M views &#183; 2 years ago
                </p>
            </div>

        </div>

    </div>

    <!-- Second Video -->
    <div class="preview2">

        <div class="thumbnail-row2">
            <img class="thumbnail2" src="thumbnails/thumbnail-2.webp">
        </div>

        <div>

            <div class="channel-pic2">
                <img class="profile2" src="channel-pic/channel-2.jpeg">
            </div>

            <div class="video-info2">
                <p class="title2">
                    
                 Try Not To Laugh Challenge #9


                </p>

                <p class="auth2">
                    Markiplier
                </p>

                <p class="info2">
                    19M views &#183; 4 years ago
                </p>
            </div>

        </div>

    </div>


</body>
</html>
